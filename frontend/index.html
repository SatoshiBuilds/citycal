<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CityCal | Your City. All Events.</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="hero">
        <div class="container">
            <h1>CityCal</h1>
            <p class="tagline">Your city. All events. One dashboard.</p>
            <div class="city-selector">
                <label for="city-select">Select your city:</label>
                <select id="city-select">
                    <option value="aachen">Aachen</option>
                    <option value="koeln">Cologne (Köln)</option>
                    <option value="berlin">Berlin</option>
                </select>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="view-tabs">
            <button id="tab-calendar" class="tab active" data-view="calendar">
                📅 Calendar
            </button>
            <button id="tab-map" class="tab" data-view="map">
                🗺️ Map
            </button>
        </div>

        <div id="status-bar" class="status-bar">
            <span id="event-count">Loading events...</span>
            <div class="filters">
                <input type="text" id="search-input" placeholder="🔍 Search events..." />
                <select id="category-filter">
                    <option value="">All categories</option>
                    <option value="music">Music</option>
                    <option value="sports">Sports</option>
                    <option value="arts">Arts</option>
                    <option value="workshops">Workshops</option>
                    <option value="community">Community</option>
                    <option value="nightlife">Nightlife</option>
                    <option value="other">Other</option>
                </select>
            </div>
        </div>

        <section id="calendar-view" class="view-section active">
            <div id="calendar"></div>
        </section>

        <section id="map-view" class="view-section">
            <div id="map"></div>
        </section>

        <section id="events-list" class="events-list">
            <h2>Upcoming Events</h2>
            <div id="events-container"></div>
        </section>

        <section id="debug" class="debug">
            <details>
                <summary>Debug / API</summary>
                <pre id="raw-api">
API: <code>http://localhost:8000</code>
City selector syncs with endpoints.

Example:
GET <code>/events?city=koeln&from=...</code>
                </pre>
            </details>
        </section>
    </main>

    <footer class="footer">
        <p>CityCal · Built to aggregate the real urban scene · v0.1.0</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
